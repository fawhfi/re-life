<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Re-Life — Create Account</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/png" href="/static/assets/favicon.png">
  <style>
    .step { display: none; }
    .step.active { display: block; }
    .code-input {
      width: 100%;
      padding: 14px;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 8px;
      font-family: monospace;
      border: 2px solid var(--color-gray-200);
      border-radius: var(--radius-sm);
      background: var(--color-gray-50);
      color: var(--color-gray-800);
      outline: none;
    }
    .code-input:focus {
      border-color: var(--color-primary-mid);
      box-shadow: 0 0 0 3px rgba(90, 154, 107, 0.15);
    }
    .verify-hint {
      font-size: 11px;
      color: var(--color-gray-500);
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body class="login-page">
<div class="login-shell">

  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo"><img src="/static/assets/Logo.png" alt="Re-Life" style="width:128px;height:128px"></div>
      <div class="login-sub" id="step-title">Create your eco account</div>
    </div>

    <!-- STEP 1: Register form -->
    <div class="step active" id="step-register">
      <form class="login-form" id="register-form" onsubmit="handleRegister(event)">
        <div class="login-field">
          <label class="login-label" for="reg-username">Choose Username</label>
          <input class="login-input" type="text" id="reg-username" placeholder="EcoWarrior" autocomplete="off" required minlength="2" maxlength="24">
        </div>
        <div class="login-field">
          <label class="login-label" for="reg-email">Email Address</label>
          <input class="login-input" type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="login-field">
          <label class="login-label" for="reg-password">Choose Password</label>
          <input class="login-input" type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password" required minlength="4">
        </div>
        <div class="login-error" id="register-error"></div>
        <button class="login-btn login-btn--primary" type="submit" id="register-submit-btn">
          <span>Send Verification Code</span>
        </button>
      </form>
    </div>

    <!-- STEP 2: Verify code -->
    <div class="step" id="step-verify">
      <form class="login-form" id="verify-form" onsubmit="handleVerify(event)">
        <div class="login-field">
          <label class="login-label">Verification Code</label>
          <input class="code-input" type="text" id="verify-code" placeholder="000000" inputmode="numeric" maxlength="6" minlength="6" autocomplete="one-time-code" required>
        </div>
        <div class="verify-hint" id="verify-hint"></div>
        <div class="login-error" id="verify-error"></div>
        <button class="login-btn login-btn--primary" type="submit" id="verify-submit-btn">
          <span>Verify & Create Account</span>
        </button>
        <button class="login-btn login-btn--ghost" type="button" onclick="goBack()" style="margin-top:0">
          ← Try a different email
        </button>
      </form>
    </div>

    <div class="login-divider" style="margin-top:12px">
      <span>or</span>
    </div>

    <a href="/login" class="login-btn login-btn--ghost" style="text-decoration:none;text-align:center;display:block">
      ← Back to Login
    </a>

    <div class="login-footer">
      <button class="login-footer-link" onclick="toggleTheme()" id="theme-btn">🌙</button>
      <span class="login-footer-dot">·</span>
      <button class="login-footer-link" onclick="toggleRegisterLang()">🌐 EN</button>
      <span class="login-footer-dot">·</span>
      <span class="login-footer-text">v4.2.0 HK</span>
    </div>
  </div>

</div>

<script type="module" src="/static/firebase.js"></script>
<script>
// ── Theme ────────────────────────────────────────────────────────────
(function initTheme() {
    const saved = localStorage.getItem('RE_LIFE_THEME') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    const btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = saved === 'dark' ? '☀️' : '🌙';
})();
function toggleTheme() {
    const c = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', c);
    localStorage.setItem('RE_LIFE_THEME', c);
    const btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = c === 'dark' ? '☀️' : '🌙';
}

let registerLang = localStorage.getItem('RE_LIFE_LANG') || 'en';
let pendingEmail = '';
let pendingUsername = '';
let pendingPassword = '';

function toggleRegisterLang() {
    registerLang = registerLang === 'en' ? 'zh' : 'en';
    localStorage.setItem('RE_LIFE_LANG', registerLang);
    location.reload();
}

function showStep(id) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (id === 'step-verify') {
        document.getElementById('step-title').textContent = 'Verify your email';
        document.getElementById('verify-hint').textContent = 'We sent a 6-digit code to ' + pendingEmail;
    } else {
        document.getElementById('step-title').textContent = 'Create your eco account';
    }
}

function goBack() {
    showStep('step-register');
}

function waitForFB(cb) {
    if (window.FB) { cb(); return; }
    let tries = 0;
    const timer = setInterval(() => {
        if (window.FB) { clearInterval(timer); cb(); return; }
        if (++tries > 100) { clearInterval(timer); console.error('FB not loaded'); }
    }, 100);
}

async function handleRegister(e) {
    e.preventDefault();
    const errorEl = document.getElementById('register-error');
    const btn = document.getElementById('register-submit-btn');
    errorEl.textContent = '';

    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    if (!username || username.length < 2) {
        errorEl.textContent = registerLang === 'zh' ? '用戶名至少需要2個字符' : 'Username must be at least 2 characters';
        return;
    }
    if (!email || !email.includes('@') || !email.includes('.')) {
        errorEl.textContent = registerLang === 'zh' ? '請輸入有效的電子郵件' : 'Please enter a valid email address';
        return;
    }
    if (!password || password.length < 4) {
        errorEl.textContent = registerLang === 'zh' ? '密碼至少需要4個字符' : 'Password must be at least 4 characters';
        return;
    }

    btn.textContent = 'Sending...';
    try {
        const res = await fetch('/api/send-verification', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (data.ok) {
            pendingEmail = email;
            pendingUsername = username;
            pendingPassword = password;
            showStep('step-verify');
            // Show dev code if SMTP unavailable
            if (data.dev_code) {
                document.getElementById('verify-hint').textContent =
                    'DEV MODE — code: ' + data.dev_code + ' (sent to ' + pendingEmail + ')';
            } else {
                document.getElementById('verify-hint').textContent =
                    'We sent a 6-digit code to ' + pendingEmail;
            }
            document.getElementById('verify-code').focus();
        } else {
            errorEl.textContent = data.error || 'Failed to send verification code';
        }
    } catch (err) {
        errorEl.textContent = 'Network error — check your connection';
        console.error(err);
    }
    btn.textContent = 'Send Verification Code';
}

async function handleVerify(e) {
    e.preventDefault();
    const errorEl = document.getElementById('verify-error');
    const btn = document.getElementById('verify-submit-btn');
    errorEl.textContent = '';

    const code = document.getElementById('verify-code').value.trim();
    if (!code || code.length !== 6) {
        errorEl.textContent = 'Please enter the 6-digit code';
        return;
    }

    btn.textContent = 'Verifying...';
    try {
        const res = await fetch('/api/verify-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: pendingEmail, code }),
        });
        const data = await res.json();
        if (!data.ok) {
            errorEl.textContent = data.error || 'Invalid code';
            btn.textContent = 'Verify & Create Account';
            return;
        }

        // Code verified — now create the user in Firebase
        await waitForFBPromise();
        const user = await window.FB.createUser(pendingUsername, pendingPassword, pendingEmail);
        localStorage.setItem('RE_LIFE_CURRENT_USER', user.displayName);
        localStorage.setItem('RE_LIFE_USER_AVATAR', '👤');
        window.location.replace('/');
    } catch (err) {
        if (err.message === 'USERNAME_TAKEN') {
            errorEl.textContent = registerLang === 'zh' ? '用戶名已被使用' : 'Username already taken';
        } else if (err.message === 'EMAIL_TAKEN') {
            errorEl.textContent = registerLang === 'zh' ? '此電子郵件已被註冊' : 'This email is already registered';
        } else {
            errorEl.textContent = err.message || 'Registration failed';
        }
        console.error(err);
    }
    btn.textContent = 'Verify & Create Account';
}

function waitForFBPromise() {
    return new Promise((resolve, reject) => {
        if (window.FB) return resolve();
        let tries = 0;
        const timer = setInterval(() => {
            if (window.FB) { clearInterval(timer); resolve(); return; }
            if (++tries > 100) { clearInterval(timer); reject(new Error('FB not loaded')); }
        }, 100);
    });
}
</script>
</body>
</html>
