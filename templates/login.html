<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Re-Life — Login</title>
  <script>
    (function () {
      try {
        const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const lowEnd = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches)
          || !!(connection && connection.saveData)
          || (typeof navigator.deviceMemory === 'number' && navigator.deviceMemory > 0 && navigator.deviceMemory <= 4)
          || (!isIOS && typeof navigator.hardwareConcurrency === 'number' && navigator.hardwareConcurrency > 0 && navigator.hardwareConcurrency <= 4);
        if (lowEnd) document.documentElement.classList.add('perf-lite');
      } catch (_) {}
    })();
  </script>
  <script src="/static/js/auth-theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="icon" type="image/png" href="/static/assets/favicon.png">
</head>
<body class="login-page">
<div class="login-shell">

  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo"><img src="/static/assets/Logo.png" alt="Re-Life" style="width:128px;height:128px"></div>
    </div>

    <form class="login-form" id="login-form">
      <div class="login-field">
        <label class="login-label" for="login-username">Username</label>
        <input
          class="login-input"
          type="text"
          id="login-username"
          placeholder="EcoWarrior"
          autocomplete="username"
          required
          minlength="2"
          maxlength="24"
        >
      </div>
      <div class="login-field">
        <label class="login-label" for="login-password">Password</label>
        <input
          class="login-input"
          type="password"
          id="login-password"
          placeholder="••••••••"
          autocomplete="current-password"
          minlength="4"
        >
      </div>

      <div class="login-error" id="login-error"></div>

      <button class="login-btn login-btn--primary" type="submit" id="login-submit-btn">
        <span>Log In</span>
      </button>

      <div class="login-divider">
        <span>or</span>
      </div>

      <a href="/register" class="login-btn login-btn--ghost" style="text-decoration:none;text-align:center;display:block">
        Create Account
      </a>
    </form>

    <!-- Forgot Password -->
    <div style="text-align:center;margin-top:12px">
      <button class="login-footer-link" onclick="showForgotForm()" id="forgot-link">Forgot Password?</button>
    </div>
    <div class="hidden" id="forgot-form" style="margin-top:8px">
      <div class="login-field">
        <label class="login-label" for="forgot-email">Email Address</label>
        <input class="login-input" type="email" id="forgot-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="login-field hidden" id="forgot-code-field">
        <label class="login-label" for="forgot-code">Reset Code</label>
        <input class="login-input" type="text" id="forgot-code" placeholder="000000" inputmode="numeric" maxlength="6">
      </div>
      <div class="login-field hidden" id="forgot-password-field">
        <label class="login-label" for="forgot-password">New Password</label>
        <input class="login-input" type="password" id="forgot-password" placeholder="••••••••" minlength="8">
      </div>
      <div class="login-error" id="forgot-error"></div>
      <button class="login-btn login-btn--primary btn--full" onclick="handleForgotStep()" id="forgot-btn" style="margin-top:6px">Send Reset Code</button>
    </div>

    <div class="login-footer">
      <div class="auth-theme-control">
        <span class="auth-theme-icon" data-auth-theme-icon aria-hidden="true">🌿</span>
        <select class="auth-theme-select" data-auth-theme-select aria-label="Theme" onchange="applyAuthTheme(this.value)">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="forest">Forest</option>
          <option value="ocean">Ocean</option>
          <option value="sunset">Sunset</option>
          <option value="midnight">Midnight</option>
        </select>
      </div>
      <span class="login-footer-dot">·</span>
      <button class="login-footer-link" onclick="toggleLoginLang()">🌐 EN</button>
      <span class="login-footer-dot">·</span>
      <span class="login-footer-text">v4.2.0 HK</span>
    </div>
  </div>

</div>

<script type="module" src="/static/supabase.js"></script>
<script>
// Wait for backend storage helper to initialize window.FB
function waitForStorage(cb) {
    if (window.FB) { cb(); return; }
    let tries = 0;
    const timer = setInterval(() => {
        if (window.FB) { clearInterval(timer); cb(); return; }
        if (++tries > 100) { clearInterval(timer); console.error('Storage helper not loaded'); }
    }, 100);
}

let loginLang = localStorage.getItem('RE_LIFE_LANG') || 'en';
function toggleLoginLang() {
    loginLang = loginLang === 'en' ? 'zh' : 'en';
    localStorage.setItem('RE_LIFE_LANG', loginLang);
    location.reload();
}

waitForStorage(() => {
    document.getElementById('login-form').addEventListener('submit', handleLogin);
});

async function handleLogin(e) {
    e.preventDefault();
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('login-submit-btn');
    errorEl.textContent = '';
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value;
    if (!username) {
        errorEl.textContent = loginLang === 'zh' ? '請輸入用戶名' : 'Please enter a username';
        return;
    }
    if (!password) {
        errorEl.textContent = loginLang === 'zh' ? '請輸入密碼' : 'Please enter a password';
        return;
    }
    btn.textContent = '...';
    try {
        const user = await window.FB.loginUser(username, password);
        localStorage.setItem('RE_LIFE_CURRENT_USER', user.displayName);
        localStorage.setItem('RE_LIFE_CURRENT_USER_ID', String(user.id || user.public_id || ''));
        localStorage.setItem('RE_LIFE_CURRENT_USER_KEY', String(user.public_id || user.userId || ''));
        localStorage.setItem('RE_LIFE_USER_AVATAR', user.photoUrl || '👤');
        window.location.replace('/');
    } catch (err) {
        if (err.message === 'USER_NOT_FOUND') {
            errorEl.textContent = loginLang === 'zh' ? '用戶不存在，請先註冊' : 'User not found. Please register first.';
        } else if (err.message === 'WRONG_PASSWORD') {
            errorEl.textContent = loginLang === 'zh' ? '密碼錯誤' : 'Wrong password.';
        } else {
            errorEl.textContent = 'Login failed. Try again.';
        }
        console.error('Login error:', err);
    }
    btn.textContent = 'Log In';
}

// ── Forgot Password Flow ────────────────────────────────────────────
let forgotStep = 0; // 0=enter email, 1=enter code+password
let forgotEmail = '';

function showForgotForm() {
    document.getElementById('forgot-form').classList.toggle('hidden');
    forgotStep = 0;
    document.getElementById('forgot-code-field').classList.add('hidden');
    document.getElementById('forgot-password-field').classList.add('hidden');
    document.getElementById('forgot-btn').textContent = 'Send Reset Code';
    document.getElementById('forgot-error').textContent = '';
}

async function handleForgotStep() {
    const errorEl = document.getElementById('forgot-error');
    const btn = document.getElementById('forgot-btn');
    errorEl.textContent = '';

    if (forgotStep === 0) {
        const email = document.getElementById('forgot-email').value.trim();
        if (!email) { errorEl.textContent = 'Please enter your email'; return; }
        btn.textContent = 'Sending...';
        try {
            const res = await fetch('/api/forgot-password', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ email }),
            });
            const data = await res.json();
            if (data.ok) {
                forgotEmail = email;
                forgotStep = 1;
                document.getElementById('forgot-code-field').classList.remove('hidden');
                document.getElementById('forgot-password-field').classList.remove('hidden');
                btn.textContent = 'Reset Password';
                if (data.dev_code) {
                    errorEl.textContent = 'DEV: ' + data.dev_code;
                    errorEl.style.color = '#047857';
                }
            } else {
                errorEl.textContent = data.error || 'Failed to send code';
            }
        } catch (_) { errorEl.textContent = 'Network error'; }
        btn.textContent = 'Send Reset Code';
    } else {
        const code = document.getElementById('forgot-code').value.trim();
        const password = document.getElementById('forgot-password').value;
        if (!code || code.length !== 6) { errorEl.textContent = 'Enter the 6-digit code'; return; }
        if (!password || password.length < 8) { errorEl.textContent = 'Password must be 8+ chars'; return; }
        btn.textContent = 'Resetting...';
        try {
        const res = await fetch('/api/reset-password', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ email: forgotEmail, code, password }),
        });
        const data = await res.json();
        if (data.ok) {
            errorEl.textContent = '✅ Password reset! You can now log in.';
            errorEl.style.color = '#047857';
            btn.textContent = 'Done';
                btn.disabled = true;
            } else {
                errorEl.textContent = data.error || 'Invalid code';
            }
        } catch (err) {
            errorEl.textContent = 'Reset failed: ' + (err.message || 'try again');
            console.error(err);
        }
        btn.textContent = 'Reset Password';
    }
}

function waitForStoragePromise() {
    return new Promise((resolve, reject) => {
        if (window.FB) return resolve();
        let tries = 0;
        const timer = setInterval(() => {
            if (window.FB) { clearInterval(timer); resolve(); return; }
            if (++tries > 100) { clearInterval(timer); reject(new Error('Storage helper not loaded')); }
        }, 100);
    });
}
</script>
</body>
</html>
